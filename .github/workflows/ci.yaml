name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        sphinx-needs: ["6.3.0", "7.0.0", "8.0.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install nox
      - run: nox -s "tests-${{ matrix.python-version }}(sphinx_needs='${{ matrix.sphinx-needs }}')"

  lint:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install nox && nox -s lint

  commit-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install "commitizen>=3.0"

      - name: Check commit messages
        run: cz check --rev-range origin/${{ github.base_ref }}..HEAD

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install "commitizen>=3.0"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: cz
        run: |
          set +e
          cz bump --yes
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 21 ] || [ $EXIT_CODE -eq 3 ]; then
            echo "No releasable commits since last tag, skipping release."
            echo "bumped=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 0 ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            exit $EXIT_CODE
          fi

      - name: Push bump commit and tag
        if: steps.cz.outputs.bumped == 'true'
        run: git push origin main --follow-tags

